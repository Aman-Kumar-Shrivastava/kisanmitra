<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroTrack | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-leaf"></i> AgroTrack
            </a>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li class="nav-item-dropdown">
                    <a href="index.html#features">Features <i class="fa-solid fa-chevron-down" style="font-size: 0.8rem; margin-left: 4px;"></i></a>
                    <ul class="nav-dropdown">
                        <li><a href="index.html#fields"><i class="fa-solid fa-map icon-left"></i> My Fields</a></li>
                        <li><a href="index.html#tracker"><i class="fa-solid fa-leaf icon-left"></i> Crop Tracker</a></li>
                        <li><a href="index.html#pests"><i class="fa-solid fa-bug icon-left"></i> Pest Alerts</a></li>
                        <li><a href="index.html#reports"><i class="fa-solid fa-chart-line icon-left"></i> Reports</a></li>
                        <li><a href="index.html#weather"><i class="fa-solid fa-cloud-sun icon-left"></i> Weather</a></li>
                    </ul>
                </li>
                <li><a href="market.html">Market</a></li>
                <li><a href="community.html">Community</a></li>
                <li><a href="index.html#pricing">Pricing</a></li>
            </ul>
            <div class="nav-actions">
                <a href="login.html" class="login-btn">Login</a>
                <a href="/register" class="cta-btn sm">Get Started Free</a>
            </div>
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>

    <section class="login-section">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <form action="profile.html" method="GET">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="farmer@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="********">
                </div>
                <div class="login-options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#" class="link-btn">Forgot Password?</a>
                </div>
                <button type="submit" class="cta-btn primary-cta full-width">Login to Dashboard</button>
            </form>
            <p class="mt-4 text-gray">Don't have an account? <a href="/register" class="link-btn">Sign up</a></p>
        </div>
    </section>

    <footer style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.9rem; background: var(--bg-dark);">
        <p>&copy; 2026 AgroTrack Inc. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
